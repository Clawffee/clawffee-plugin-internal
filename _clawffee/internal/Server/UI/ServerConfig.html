<form id="contactForm">
    <div class="form-floating mb-3">
        <input class="form-control" id="port" type="text" placeholder="Port" data-sb-validations="required" />
        <label for="port">Port</label>
        <div class="invalid-feedback" data-sb-feedback="port:required">Port is required.</div>
    </div>
    <div class="mb-3">
        <div class="form-check form-switch">
            <input class="form-check-input" id="logDebugValues" type="checkbox" name="logDebugValues" />
            <label class="form-check-label" for="logDebugValues">Log Debug Values</label>
        </div>
    </div>
    <div class="d-flex flex-end">
        <button class="btn btn-primary disabled" id="submitButton" type="submit">Save</button>
    </div>
</form>
