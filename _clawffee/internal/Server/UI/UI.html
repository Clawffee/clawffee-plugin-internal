    <script>
        const darkModeMql = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');

        if (darkModeMql && darkModeMql.matches) {

        window.addEventListener('load', () => {
            document.getElementById('overlay').style.top = "100vh";

            <style>
                .terminal {
                    position: relative;
                    align-content: end;
                    height: calc(100vh - 5em);
                    width: 100vw;
                    overflow: hidden;
                    font-family: monospace;
                    font-size: 80%;

                    &::after {
                        content: "";
                        position: absolute;
                        top: 0;
                        height: 32px;
                        left: 0;
                        right: 0;
                        background: linear-gradient(180deg, var(--bs-tertiary-bg), transparent);
                        z-index: 10;
                    }

                    &>* {
                        z-index: -1;
                    }
                }

                #consoleWindow {
                    max-height: calc(100vh - 5em);
                    overflow: hidden scroll;
                    display: grid;
                    grid-template-columns: min-content auto;

                    &>* {
                        box-sizing: content-box;
                        padding-left: 4px;
                        padding-right: 4px;
                        vertical-align: top;
                        --text-color: var(--bs-tertiary-color);

                        &:nth-child(odd) {
                            border-right: 2px solid var(--text-color);
                            text-align: start;
                            max-width: 30vw;
                            overflow-x: hidden;
                            overflow-y: visible;
                            word-break: keep-all;
                            white-space: nowrap;
                            overflow: hidden;
                            z-index: 2;

                            &>* {
                                display: flex;
                                width: max-content;
                                flex-wrap: wrap;
                            }
                        }

                        &:nth-child(even) {
                            word-break: break-all;
                            line-break: anywhere;
                            text-wrap-mode: wrap;
                            text-wrap-style: pretty;
                            z-index: 1;
                            overflow-x: visible;
                            padding-left: calc(1ch + 3px);
                        }

                        &:nth-child(4n + 1),
                        &:nth-child(4n + 2) {
                            background-color: #ffffff06;
                        }
                    }
                }
            </style>
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasExample"
                aria-controls="offcanvasExample">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
        <div class="terminal bg-body mt-2">
            <div id="consoleWindow"></div>
        </div>
