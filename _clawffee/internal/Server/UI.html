<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clawffee — Dashboard</title>
    <link href="../../../node_modules/bootstrap/dist/css/bootstrap.css" rel="stylesheet">
    <style>
        body {
            font-size: 90%;
        }
        .terminal {
            position: relative;
            align-content: end;
            height: 20vh;
            width: 100vw;
            overflow: none scroll;
            font-family: monospace;
            font-size: 80%;
        }
        #consoleWindow {
            display: grid;
            grid-template-columns: min-content auto;
            &::after {
                content: "";
                position: absolute;
                top: 0;
                height: 32px;
                left: 0;
                right: 0;
                background: linear-gradient(180deg, var(--bs-tertiary-bg), transparent);
                z-index: 1;
            }
            &>* {
                box-sizing: content-box;
                overflow: hidden;
                padding-left: 4px;
                padding-right: 4px;
                vertical-align:top;
                --text-color: var(--bs-tertiary-color);
                &:nth-child(odd) {
                    border-right: 2px solid var(--text-color);
                    text-align: start;
                    max-width: 30vw;
                    overflow-x: hidden;
                    word-break: keep-all;
                    white-space: nowrap;
                    display: flex;
                    overflow: hidden;
                    flex-wrap: wrap;
                }
                &:nth-child(even) {
                    word-break: break-all;
                    line-break: anywhere;
                    text-wrap-mode: wrap;
                    text-wrap-style: pretty;
                }
                &:nth-child(4n + 1), &:nth-child(4n + 2) {
                    background-color: #ffffff06;
                }
            }
        }
        @media (prefers-reduced-motion: no-preference) {
            * {
                scroll-behavior: smooth;
            }
        }
    </style>
    <script>
        const consoleCache = [];
        /**
         * @type {HTMLElement}
         */
        let consoleWindow;
        const windowURL = /[^\/]*.$/.exec(window.location.href)[0];
        /**
         * @param {string} name
         * @param {string} cls
         * @param {string} text
         */
        function addToConsole(name, line, cls, text) {
            if(!consoleWindow) return consoleCache.push({name, line, cls, text});
            const nameobj = document.createElement('div');
            nameobj.appendChild(document.createElement('div'));
            nameobj.appendChild(document.createElement('div'));
            nameobj.firstChild.innerText = name;
            nameobj.lastChild.innerText = line;
            const textobj = document.createElement('div');
            textobj.innerText = text;
            if(cls) {
                textobj.style.setProperty('--text-color', cls);
                nameobj.style.setProperty('--text-color', cls);
            }
            consoleWindow.appendChild(nameobj);
            consoleWindow.appendChild(textobj);
            if(consoleWindow.childElementCount > 200) {
                consoleWindow.removeChild(consoleWindow.firstChild);
                consoleWindow.removeChild(consoleWindow.firstChild);
                consoleWindow.removeChild(consoleWindow.firstChild);
                consoleWindow.removeChild(consoleWindow.firstChild);
            }
            consoleWindow.lastElementChild.scrollIntoView();
        }
        window.onload = () => {
            consoleWindow = document.getElementById("consoleWindow");
            let v;
            while(v = consoleCache.shift()) addToConsole(v.name, v.line, v.cls, v.text);
        };
        function wrapCons(name, cls) {
            const bak = console[name];
            console[name] = (...data) => {
                const stack = {};
                Error.captureStackTrace(stack, console[name]);
                const line = /([^\/]*.)(:\d+:\d+)$/.exec(stack.stack.split('\n')[0]);
                let n = line?.[1];
                if(n?.startsWith(windowURL)) {
                    n = "UI" + n.substring(windowURL.length);
                }
                bak(line, ...data);
                addToConsole(n ?? "[unknown]", line?.[2] ?? "", cls, data.map(v => (typeof v == 'object')?JSON.stringify(v):String(v)).join('\n'));
            }
        }
        wrapCons('info', "var(--bs-primary)");
        wrapCons('error', "var(--bs-danger)");
        wrapCons('warn', "var(--bs-warning)");
        wrapCons('log', "var(--bs-tertiary-color)");
    </script>
    <script src="Connect.js"></script>
</head>
<body data-bs-theme="dark">
    <nav class="navbar fixed-bottom navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <h5>Terminal</h5>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
        <div class="terminal bg-body mt-2">
            <div id="consoleWindow"></div>
        </div>
    </nav>
    <div style="height: 10000px;"></div>
    <script src="../../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
